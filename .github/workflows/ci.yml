name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Single source of truth: the same aggregate gate developers run locally
  # (`mise run ci`) — tidy, fmt, vet, lint, test, sdk freshness, vuln scan, build.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - run: mise run ci

      # Vuln scan is network/time-dependent (new disclosures can fail it without
      # a code change), so it runs in CI but is not part of the local gate.
      - run: mise run vulncheck
