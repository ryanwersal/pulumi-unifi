name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # Cross-platform plugin binaries → GitHub Release assets. Pulumi's github://
  # plugin resolver (pluginDownloadURL in the schema) installs these.
  binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload assets
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Regenerate the Node.js SDK at the tagged version and publish it to npm.
  # Gated on `binaries` so the GitHub Release assets (which the SDK's
  # pluginDownloadURL resolves) exist before consumers can `npm add`.
  publish-npm:
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for npm trusted publishing (no NPM_TOKEN)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Build plugin (version-stamped) and generate SDK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build \
            -ldflags "-X github.com/ryanwersal/pulumi-unifi/provider.Version=${VERSION}" \
            -o bin/pulumi-resource-unifi ./cmd/pulumi-resource-unifi
          pulumi package gen-sdk ./bin/pulumi-resource-unifi --language nodejs --out sdk

      - name: Build and publish SDK
        working-directory: sdk/nodejs
        run: |
          npm install
          npm run build
          # The compiled package lives in bin/ and loads ./package.json at
          # runtime (see utilities.ts), so publish from there.
          cp package.json README.md bin/
          npm publish --access public ./bin
