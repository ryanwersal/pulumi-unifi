# pulumi-unifi — toolchain + task orchestration
# Docs: https://mise.jdx.dev

[tools]
# Pinned for reproducible builds. Bump deliberately.
go = "1.26.4"
pulumi = "3.241.0"
golangci-lint = "2.11.3"
goreleaser = "2.15.3"
svu = "3.4.0"
# Used to build/publish the generated TypeScript SDK.
node = "24.15.0"

[env]
# Plugin name (Pulumi convention: the binary is pulumi-resource-<NAME>).
PROVIDER_NAME = "unifi"
# Where generated SDKs land.
SDK_DIR = "sdk"
# Published npm package name (see WithLanguageMap in provider/provider.go).
NPM_PACKAGE = "@ryanwersal/pulumi-unifi"
# owner/repo, used for plugin downloads and npm trusted publishing.
REPO = "ryanwersal/pulumi-unifi"

[tasks.build]
description = "Build the provider plugin binary; set VERSION=x.y.z to stamp it"
run = '''
if [ -n "${VERSION:-}" ]; then
    go build -ldflags "-X github.com/ryanwersal/pulumi-unifi/provider.Version=$VERSION" \
        -o bin/pulumi-resource-$PROVIDER_NAME ./cmd/pulumi-resource-$PROVIDER_NAME
else
    go build -o bin/pulumi-resource-$PROVIDER_NAME ./cmd/pulumi-resource-$PROVIDER_NAME
fi
'''

[tasks.schema]
description = "Print the Pulumi schema derived from the Go types"
depends = ["build"]
run = "pulumi package get-schema ./bin/pulumi-resource-$PROVIDER_NAME"

[tasks."sdk:nodejs"]
description = "Generate the Node.js/TypeScript SDK into sdk/nodejs"
depends = ["build"]
run = "pulumi package gen-sdk ./bin/pulumi-resource-$PROVIDER_NAME --language nodejs --out $SDK_DIR"

[tasks."sdk:check"]
description = "Fail if the committed Node.js SDK is stale vs. the current schema"
depends = ["sdk:nodejs"]
run = "git diff --exit-code -- $SDK_DIR"

[tasks."sdk:build"]
description = "Compile the Node.js SDK (tsc → sdk/nodejs/bin, ready to publish)"
depends = ["sdk:nodejs"]
dir = "{{ config_root }}/sdk/nodejs"
run = ["npm install", "npm run build", "cp package.json README.md bin/"]

[tasks."sdk:publish"]
description = "Publish the Node.js SDK to npm from a local checkout (manual; CI publishes via OIDC)"
depends = ["sdk:build"]
dir = "{{ config_root }}/sdk/nodejs"
run = "npm publish --access public ./bin"

[tasks.bootstrap]
description = "One-time: register $NPM_PACKAGE on npm at a throwaway 0.0.1 so trusted publishing can be set up"
run = '''
set -eu
VERSION=0.0.1 mise run sdk:build
cd "$SDK_DIR/nodejs"
npm publish --access public ./bin
# Deprecate is cosmetic and can 404 on replication lag right after a fresh
# publish — never fail the task over it once the publish itself succeeded.
npm deprecate "$NPM_PACKAGE@0.0.1" "bootstrap release; use >=0.1.0" \
    || echo "note: deprecate failed (registry lag?); retry: npm deprecate $NPM_PACKAGE@0.0.1 ..."
cd - >/dev/null
git checkout -- "$SDK_DIR"   # undo the throwaway 0.0.1 regen
'''

[tasks.trust]
description = "One-time: configure npm trusted publishing (OIDC) for the release workflow"
run = "npm trust github $NPM_PACKAGE --file release.yml --repo $REPO -y"

[tasks.snapshot]
description = "Local cross-platform release build, no publish — sanity check before tagging"
run = "goreleaser release --snapshot --clean"

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf bin dist $SDK_DIR/nodejs/bin $SDK_DIR/nodejs/node_modules"

[tasks.test]
description = "Run unit tests"
run = "go test ./..."

[tasks.vet]
description = "Run go vet on all packages"
run = "go vet ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.fmt]
description = "Format all Go source files"
run = "gofmt -w ."

[tasks.fmt-check]
description = "Check formatting (fails if unformatted)"
run = "test -z \"$(gofmt -l .)\""

[tasks.tidy]
description = "go mod tidy"
run = "go mod tidy"

[tasks.tidy-check]
description = "Fail if go.mod/go.sum are not tidy (no mutation)"
run = "go mod tidy -diff"

[tasks.vulncheck]
description = "Scan for known vulnerabilities"
run = "go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./..."

[tasks.ci]
description = "Deterministic gate, run locally AND in CI: tidy, fmt, vet, lint, test, sdk freshness, build"
depends = ["tidy-check", "fmt-check", "vet", "lint", "test", "sdk:check"]

[tasks.check]
description = "Alias for the CI gate (ci)"
depends = ["ci"]

[tasks.release]
description = "Bump version (major|minor|patch), tag, and push — triggers the GH release + npm publish"
usage = 'arg "<bump>" help="major, minor, or patch"'
run = '''
set -eu

bump="$usage_bump"
case "$bump" in
    major|minor|patch) ;;
    *)
        echo "bump must be one of: major, minor, patch (got: $bump)" >&2
        exit 1
        ;;
esac

if [ -n "$(git status --porcelain)" ]; then
    echo "Working tree is dirty. Commit or stash before releasing." >&2
    exit 1
fi

branch=$(git rev-parse --abbrev-ref HEAD)
if [ "$branch" != "main" ]; then
    echo "Not on main (on $branch). Release from main." >&2
    exit 1
fi

git fetch --tags origin main

behind=$(git rev-list --count HEAD..origin/main)
if [ "$behind" -gt 0 ]; then
    echo "Local main is $behind commits behind origin/main. Pull first." >&2
    exit 1
fi

latest=$(svu current 2>/dev/null || echo "v0.0.0")
new=$(svu "$bump")

printf '\nCurrent: %s\nNew:     %s\n\n' "$latest" "$new"

git tag -a "$new" -m "Release $new"
git push origin main "$new"

printf '\nTag pushed. Release workflow running at:\n'
printf '  https://github.com/ryanwersal/pulumi-unifi/actions\n'
'''
