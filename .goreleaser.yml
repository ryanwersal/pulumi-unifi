# The archive naming is load-bearing: Pulumi's github:// plugin resolver (see
# pluginDownloadURL in provider.go) fetches assets named
# pulumi-resource-unifi-v<ver>-<os>-<arch>.tar.gz with the binary at the root.
version: 2

builds:
  - id: unifi
    main: ./cmd/pulumi-resource-unifi
    binary: pulumi-resource-unifi
    env:
      - CGO_ENABLED=0 # pure-Go provider, cross-compiles freely
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/ryanwersal/pulumi-unifi/provider.Version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: archive
    name_template: "pulumi-resource-unifi-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    wrap_in_directory: false
    files:
      - LICENSE

checksum:
  name_template: "pulumi-resource-unifi-{{ .Version }}-checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-SNAPSHOT"

release:
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
