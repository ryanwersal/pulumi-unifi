# Releases the UniFi Pulumi plugin binary. The archive naming is load-bearing:
# Pulumi's github:// plugin resolver (see pluginDownloadURL in provider.go)
# fetches assets named pulumi-resource-unifi-v<ver>-<os>-<arch>.tar.gz.
version: 2

builds:
  - id: unifi
    main: ./cmd/pulumi-resource-unifi
    binary: pulumi-resource-unifi
    env:
      # Pure-Go provider — cross-compile freely without a C toolchain.
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # No demand for Windows on ARM; drop it to keep the matrix lean.
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/ryanwersal/pulumi-unifi/provider.Version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: archive
    # Must match what `pulumi plugin install` expects from a github:// source.
    name_template: "pulumi-resource-unifi-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    # Binary at the archive root (no nested dir) — the plugin loader expects it.
    wrap_in_directory: false
    files:
      - LICENSE

checksum:
  name_template: "pulumi-resource-unifi-{{ .Version }}-checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-SNAPSHOT"

release:
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
